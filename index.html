<!DOCTYPE html>
<html lang="fr">
<head>

  <title>FLV.exe</title>

</head>

    <!-- ────────────────────────────────────────────────────

      <nav class="nav">

        <!-- MAIN NAV LINKS -->
        <a href="#">profil</a>
        <a href="#">livre d'or</a>
        <a href="#">à propos</a>
        <a href="#">blog</a>
        <a href="#">sites</a>
        <a href="#">graphiques</a>
        <a href="#">galerie</a>

        <!-- COLLAPSIBLE SECTION — OC / UNIVERS -->
        <details class="details">
          <summary>univers OC</summary>
          <a href="#"><!-- LIEN ICI --></a>
          <a href="#"><!-- LIEN ICI --></a>
        </details>

        <!-- COLLAPSIBLE SECTION — SHRINES -->
        <details class="details">
          <summary>shrines</summary>
          <a href="#"><!-- SHRINE ICI --></a>
          <a href="#"><!-- SHRINE ICI --></a>
        </details>

        <!-- COLLAPSIBLE SECTION — AUTRE -->
        <details class="details">
          <summary>autre</summary>
          <a href="#"><!-- LIEN ICI --></a>
          <a href="#"><!-- LIEN ICI --></a>
        </details>

      </nav>

      <!-- 88×31 BADGES -->
      <div class="box" style="margin-top:10px;">
        <div class="badges">
          <!-- BADGE ICI --><span class="badge">badge</span>
          <!-- BADGE ICI --><span class="badge">badge</span>
          <!-- BADGE ICI --><span class="badge">badge</span>
          <!-- BADGE ICI --><span class="badge">badge</span>
          <!-- BADGE ICI --><span class="badge">badge</span>
          <!-- BADGE ICI --><span class="badge">badge</span>
        </div>
      </div>

    </aside>
    <!-- /aside.left -->

    <!-- ────────────────────────────────────────────────────
         MAIN CONTENT
         ──────────────────────────────────────────────────── -->
    <main>

      <!-- WELCOME BOX -->
      <div class="box">
        <div class="content">
          <p class="section-title">WELCOME ! ようこそ！</p>

          <!-- IMAGE STAMPS ICI -->
          <div class="placeholder" style="min-height:50px; margin-bottom:6px;">
            <!-- STAMPS / IMAGES DE PRÉSENTATION ICI -->
          </div>

          <!-- TEXTE D'INTRO + AVERTISSEMENT -->
          <div class="placeholder" style="min-height:60px;">
            <!-- TEXTE DE BIENVENUE ICI -->
            <!-- ex: "Ce site est optimisé pour PC 1920×1080 à 125% / thèmes matures réservés aux +16 ans" -->
          </div>
        </div>
      </div>

      <!-- UPDATES BOX -->
      <div class="box">
        <div class="content scroll" style="height:280px;">
          <p class="section-title">MISES À JOUR</p>

          <!-- LISTE DES MISES À JOUR ICI -->
          <div class="placeholder" style="min-height:200px;">
            <!-- FORMAT SUGGÉRÉ :
              <p><b>jj/mm/aaaa</b> — description de la mise à jour</p>
              <p><b>jj/mm/aaaa</b> — description de la mise à jour</p>
              ...
            -->
          </div>
        </div>
      </div>

      <!-- TO-DO BOX -->
      <div class="box">
        <div class="content">
          <p class="section-title">TO DO</p>

          <!-- LISTE TODO ICI -->
          <div class="placeholder" style="min-height:80px;">
            <!-- FORMAT SUGGÉRÉ :
              <ul>
                <li>[ ] héberger toutes les images sur le site</li>
                <li>[ ] optimiser la galerie</li>
                <li>[ ] ajouter favicon</li>
                ...
              </ul>
            -->
          </div>
        </div>
      </div>

    </main>
    <!-- /main -->

    <!-- ────────────────────────────────────────────────────
         RIGHT ASIDE — widgets
         ──────────────────────────────────────────────────── -->
    <aside class="right">

      <!-- WIDGET 1 — large -->
      <div class="box">
        <p class="section-title" style="color:#030429; font-size:9px; padding:3px;">widget 1</p>
        <div class="placeholder" style="min-height:140px;">
          <!-- WIDGET 1 ICI -->
